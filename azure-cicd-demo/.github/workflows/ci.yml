name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: myapp

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest -v

  build-scan-push:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Docker login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ vars.ACR_LOGIN_SERVER }} \
            --username ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.vars.outputs.image_tag }} \
            -t ${{ vars.ACR_LOGIN_SERVER }}/myapp:${{ steps.vars.outputs.image_tag }} \
            app/

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ vars.ACR_LOGIN_SERVER }}/myapp:${{ steps.vars.outputs.image_tag }}
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Push image to ACR
        run: |
          docker push ${{ vars.ACR_LOGIN_SERVER }}/myapp:${{ steps.vars.outputs.image_tag }}
