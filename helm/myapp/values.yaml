replicaCount: 2

image:
  repository: ""   # set per-environment / by CI: <acr>.azurecr.io/myapp
  tag: ""          # set by CI to the git SHA — never "latest" in any real env
  pullPolicy: IfNotPresent

serviceAccount:
  name: myapp-sa

workloadIdentity:
  clientId: ""     # set per-environment to the Azure UAMI client ID

service:
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env: local

ingress:
  enabled: false
  host: ""

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
